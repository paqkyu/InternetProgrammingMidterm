<!DOCTYPE html>
<html lang="EN">
<head>
<meta charset = "UTF-8">
    <meta name = "viewport" content = "width=device-width, initial-scale=1.0">
    <title>StefGym - Programs</title>
    <link href = "https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel = "stylesheet" integrity = "sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin = "anonymous">
    <link href = "https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel = "stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <link rel = "stylesheet" href = "css/body.css">
    <link rel = "stylesheet" href = "css/navbar.css">
    <link rel= "stylesheet" href="css/contact.css">
    <link rel="stylesheet" href="css/footer.css">
    <script src = "https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src = "javascript/contact.js" defer></script>
    <script src ="javascript/components.js" defer></script>
</head>
<body class="stefgym-body">
    <div id="navbar"></div>
    <main class="container py-5">
        <section class="contact-hero text-center mb-5">
            <p class="eyebrow text-uppercase">Contact Us</p>
            <h1 class="fw-bold">Get in Touch</h1>
            <p class="lead">
                Send us a message!
            </p>
        </section>
        <section class="row g-4 mb-5">
            <div class="col-lg-6">
                <div class="contact-panel p-4 rounded-4 h-100">
                    <h2 class="mb-4">Contact Form</h2>

                    <form id="contactForm">
                        <div class="mb-3">
                            <label for="contactName" class="form-label">Name</label>
                            <input type="text" id="contactName" class="form-control" placeholder="Your name" maxlength="50">
                        </div>
                        <div class="mb-3">
                            <label for="contactEmail" class="form-label">Email</label>
                            <input type="text" id="contactEmail" class="form-control" placeholder="@Email.com" maxlength="50">
                        </div>
                        <div class="mb-3">
                            <label for="contactMessage" class="form-label">Message</label>
                            <textarea id="contactMessage" class="form-control" rows="5" placeholder="Message" maxlength="250"></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary rounded-pill px-4">
                            Send message
                        </button>
                    </form>
                </div>
            </div>
            <div class="col-lg-6">
                <div class="contact-panel p-4 rounded-4 h-100">
                    <h2 class="mb-4">Come Visit Us</h2>
                    <iframe src="https://www.google.com/maps/embed?pb=!1m28!1m12!1m3!1d4077.0182474600433!2d23.83182438830561!3d38.00487700859625!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!4m13!3e6!4m5!1s0x14a199709f059559%3A0xad1dacf4713268b2!2sAmerican%20College%20of%20Greece%2C%20Gravias%206%2C%20Ag.%20Paraskevi%20153%2042!3m2!1d38.0052684!2d23.833100899999998!4m5!1s0x14a199709f059559%3A0xad1dacf4713268b2!2sAmerican%20College%20of%20Greece%2C%20Gravias%206%2C%20Ag.%20Paraskevi%20153%2042!3m2!1d38.0052684!2d23.833100899999998!5e0!3m2!1sen!2sgr!4v1781730082328!5m2!1sen!2sgr" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade" aria label="StefGym"></iframe>
                <div class="social-links mt-4">
                    <h5>Follow Us</h5>
                    <a href="#" aria-label="Instagram"><i class=bi bi-instagram></i></a>
                    <a href="#" aria-label="Facebook"><i class=bi bi-facebook></i></a>
                    <a href="#" aria-label="X"><i class=bi bi-twitter-x></i></a>
                </div>
                </div>
            </div>
        </section>

    </main>
    <div class="modal fade" id="confirmationModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content contact-modal">
                <div class="modal-header">
                    <h5 class="modal-title">Message submitted</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p id="confirmationText"></p>
                </div>
            </div>
        </div>
    </div>
    <div id="footer"></div>
</body>
</html>
